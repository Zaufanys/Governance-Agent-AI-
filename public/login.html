<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Sign in · AI Agent Governance</title>
    <link rel="stylesheet" href="styles.css" />
    <link
      rel="icon"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%F0%9F%9B%A1%EF%B8%8F%3C/text%3E%3C/svg%3E"
    />
  </head>
  <body>
    <div class="login-wrap">
      <form class="auth-card" id="loginForm">
        <span class="pill">AI Governance · Sign in</span>
        <h1>AI Agent Governance</h1>
        <p class="muted">Sign in to review agent traces and record governance decisions.</p>

        <label
          >Username
          <input id="username" type="text" autocomplete="username" required autofocus />
        </label>
        <label
          >Password
          <input id="password" type="password" autocomplete="current-password" required />
        </label>

        <p class="auth-error" id="error" hidden></p>
        <button class="btn primary" type="submit" id="submitBtn">Sign in</button>

        <p class="muted small">
          First run? The admin username and a generated password are printed in the server console
          on startup (or set <code>ADMIN_USERNAME</code> / <code>ADMIN_PASSWORD</code>).
        </p>
      </form>
    </div>
    <script type="module" src="js/login.js"></script>
  </body>
</html>
